name: Deploy to Cloudflare Workers

# 迁移期：手动触发（canary 验证用）。批量铺开后再改为 push main 自动触发，
# 并在 docker 容器停掉后移除旧的 deploy.yml（GHCR docker 构建）。
on:
  workflow_dispatch:

concurrency:
  group: workers-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # account_id 非敏感，可写字面量；只有 CLOUDFLARE_API_TOKEN 走 secrets。
  CLOUDFLARE_ACCOUNT_ID: f6d724a5fbdfc8463c6edbc1948aebaa

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm ci 严格要求 lock 与 package.json 同步；历史遗留站 lock 过期（缺传递依赖如
        # @swc/helpers）会 EUSAGE 直接栽掉 install。fallback npm install 自愈重解析
        # （lock 同步的站走 npm ci 不受影响，性能不降）。
        run: npm ci || npm install --no-audit --no-fund

      - name: Install Wrangler (no package.json change)
        # 静态导出 + asset-only：不再需要 OpenNext，只需 wrangler 部署静态资产
        run: npm i -D wrangler@^4.103.0 --no-save

      - name: Generate content manifest
        # Workers 无运行时文件系统，内容枚举靠构建期清单（sitemap/llms/分类页依赖它）
        run: node scripts/generate-content-manifest.mjs

      - name: Build (Next static export → out/)
        # NEXT_PUBLIC_* 是构建期内联，必须在 build 时注入。复用与 docker 构建同一批 secrets，
        # 保证站点 URL / GA / Clarity / AdSense / 广告位与原 docker 站零漂移。
        env:
          # 大站(数千篇 MDX)next build 需要更大堆，对齐 docker Dockerfile 的 4GB，
          # 否则默认 ~2GB 堆 GC 抖动→构建超慢→撞 timeout 被 cancel。小站不受影响。
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
          NEXT_PUBLIC_MICROSOFT_CLARITY_ID: ${{ secrets.NEXT_PUBLIC_MICROSOFT_CLARITY_ID }}
          NEXT_PUBLIC_GOOGLE_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ADSENSE_ID }}
          NEXT_PUBLIC_AD_NATIVE_BANNER: ${{ secrets.NEXT_PUBLIC_AD_NATIVE_BANNER }}
          NEXT_PUBLIC_AD_BANNER_728X90: ${{ secrets.NEXT_PUBLIC_AD_BANNER_728X90 }}
          NEXT_PUBLIC_AD_BANNER_300X250: ${{ secrets.NEXT_PUBLIC_AD_BANNER_300X250 }}
          NEXT_PUBLIC_AD_BANNER_468X60: ${{ secrets.NEXT_PUBLIC_AD_BANNER_468X60 }}
          NEXT_PUBLIC_AD_SIDEBAR_160X600: ${{ secrets.NEXT_PUBLIC_AD_SIDEBAR_160X600 }}
          NEXT_PUBLIC_AD_SIDEBAR_160X300: ${{ secrets.NEXT_PUBLIC_AD_SIDEBAR_160X300 }}
          NEXT_PUBLIC_AD_MOBILE_320X50: ${{ secrets.NEXT_PUBLIC_AD_MOBILE_320X50 }}
          NEXT_PUBLIC_AD_POPUNDER: ${{ secrets.NEXT_PUBLIC_AD_POPUNDER }}
          NEXT_PUBLIC_AD_SMARTLINK: ${{ secrets.NEXT_PUBLIC_AD_SMARTLINK }}
          # social bar 广告位（112 站使用，原模板漏掉导致该 Adsterra 广告位失效）
          NEXT_PUBLIC_AD_SOCIAL_BAR: ${{ secrets.NEXT_PUBLIC_AD_SOCIAL_BAR }}
          # 个别站使用的旧/变体命名 Adsterra key 与其它埋点（缺失则注入空，不影响其它站）
          NEXT_PUBLIC_ADSTERRA_SOCIAL_BAR_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_SOCIAL_BAR_KEY }}
          NEXT_PUBLIC_ADSTERRA_NATIVE_BANNER_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_NATIVE_BANNER_KEY }}
          NEXT_PUBLIC_ADSTERRA_BANNER_728X90_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_BANNER_728X90_KEY }}
          NEXT_PUBLIC_ADSTERRA_BANNER_468X60_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_BANNER_468X60_KEY }}
          NEXT_PUBLIC_ADSTERRA_BANNER_320X50_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_BANNER_320X50_KEY }}
          NEXT_PUBLIC_ADSTERRA_BANNER_300X250_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_BANNER_300X250_KEY }}
          NEXT_PUBLIC_ADSTERRA_BANNER_160X600_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_BANNER_160X600_KEY }}
          NEXT_PUBLIC_ADSTERRA_BANNER_160X300_KEY: ${{ secrets.NEXT_PUBLIC_ADSTERRA_BANNER_160X300_KEY }}
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_CLARITY_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_ID }}
          NEXT_PUBLIC_AHREFS_KEY: ${{ secrets.NEXT_PUBLIC_AHREFS_KEY }}
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
        run: npm run build

      - name: Promote default locale (en) to root — 保持无前缀 URL
        # 静态导出把 [locale] 产物落在 out/en、out/es… 。默认语言 en 已收录为无前缀 URL，
        # 故把 out/en/* 提升到根；非默认语言（es/pt…）保持前缀不动。
        run: |
          set -e
          if [ ! -d out/en ]; then echo "❌ out/en 不存在，静态导出可能失败"; ls -la out || true; exit 1; fi
          cp -r out/en/. out/
          if [ -f out/en.html ]; then cp -f out/en.html out/index.html
          elif [ -f out/en/index.html ]; then cp -f out/en/index.html out/index.html
          else echo "❌ 找不到 en 首页(out/en.html 或 out/en/index.html)"; ls out/en* || true; exit 1; fi
          [ -f out/en/404.html ] && cp -f out/en/404.html out/404.html || true
          echo "✓ 根 index：$(ls -la out/index.html 2>/dev/null || echo 缺失)"

      - name: Deploy to Cloudflare Workers (asset-only)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
