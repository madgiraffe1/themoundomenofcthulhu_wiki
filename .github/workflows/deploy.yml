name: Build and Deploy to GHCR

# 已降级为应急回退：默认部署走 Cloudflare Workers（deploy-workers.yml）。
# 不再 push 自动触发 GHCR docker 构建（Workers 架构下镜像无用且浪费 CI）；仅保留手动触发。
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
            NEXT_PUBLIC_MICROSOFT_CLARITY_ID=${{ secrets.NEXT_PUBLIC_MICROSOFT_CLARITY_ID }}
            NEXT_PUBLIC_GOOGLE_ADSENSE_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_ADSENSE_ID }}
            NEXT_PUBLIC_AD_NATIVE_BANNER=${{ secrets.NEXT_PUBLIC_AD_NATIVE_BANNER }}
            NEXT_PUBLIC_AD_BANNER_728X90=${{ secrets.NEXT_PUBLIC_AD_BANNER_728X90 }}
            NEXT_PUBLIC_AD_BANNER_300X250=${{ secrets.NEXT_PUBLIC_AD_BANNER_300X250 }}
            NEXT_PUBLIC_AD_BANNER_468X60=${{ secrets.NEXT_PUBLIC_AD_BANNER_468X60 }}
            NEXT_PUBLIC_AD_SIDEBAR_160X600=${{ secrets.NEXT_PUBLIC_AD_SIDEBAR_160X600 }}
            NEXT_PUBLIC_AD_SIDEBAR_160X300=${{ secrets.NEXT_PUBLIC_AD_SIDEBAR_160X300 }}
            NEXT_PUBLIC_AD_MOBILE_320X50=${{ secrets.NEXT_PUBLIC_AD_MOBILE_320X50 }}
            NEXT_PUBLIC_AD_POPUNDER=${{ secrets.NEXT_PUBLIC_AD_POPUNDER }}
            NEXT_PUBLIC_AD_SMARTLINK=${{ secrets.NEXT_PUBLIC_AD_SMARTLINK }}

  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ Image pushed to ghcr.io/${{ env.IMAGE_NAME }}:latest"
            echo "🚀 Pull and deploy on your server with:"
            echo "docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest"
            echo "docker run -d -p 3000:3000 ghcr.io/${{ env.IMAGE_NAME }}:latest"
          else
            echo "❌ Build failed"
            exit 1
          fi
